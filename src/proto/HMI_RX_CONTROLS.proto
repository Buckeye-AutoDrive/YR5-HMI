syntax = "proto3";

package vehicle_msgs;

// =======================
// Camera messages
// =======================

// Represents a single image from one camera
message CameraFrame {
  string camera_id = 1;   // e.g., "cam0"
  bytes jpeg_data = 2;    // Compressed JPEG
}

// Represents the list of images sent in one packet
message CameraBatch {
  repeated CameraFrame frames = 1;
  int64 timestamp = 2;    // Optional: shared timestamp for the batch
}


// =======================
// Navigation messages
// =======================

message Waypoint {
  float lat = 1;
  float lon = 2;
}

message Navigation {
  float current_lat  = 1;
  float current_lon  = 2;
  float heading_deg  = 3;

  repeated Waypoint waypoints = 4;  // empty / partial / full
  int32 safety_states = 5;
}

message Controls {
  int32 manual_takeover_flag = 1; // 0: False; 1: True
  string next_instruction = 2;  // e.g. "STRAIGHT", "LEFT", "RIGHT" (or "LEFT, 12.3 m")
  float next_distance_m = 3;      // meters; inf when no maneuver / straight-only
  int32 turn_signal_cmd = 4;      // 0: Off/Straight, 1: Left, 2: Right
}